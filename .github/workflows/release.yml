name: Release

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build zip
        run: |
          mkdir RaxKeyHelper
          cp RaxKeyHelper.toc Core.Lua Data.Lua Comm.lua UI.lua Alert.lua LICENSE README.md RaxKeyHelper/
          zip -r RaxKeyHelper.zip RaxKeyHelper/

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} RaxKeyHelper.zip

      - name: Update README download link
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i "s|https://github.com/DeeraxAddons/RaxKeyHelper/releases/download/.*/RaxKeyHelper.zip|https://github.com/DeeraxAddons/RaxKeyHelper/releases/download/${{ github.ref_name }}/RaxKeyHelper.zip|" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update latest version link in README.md"
          git push
